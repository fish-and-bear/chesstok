<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101512">
    <meta name="color-scheme" content="dark">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; worker-src 'self'; manifest-src 'self'; trusted-types default; require-trusted-types-for 'script'">
    <meta name="referrer" content="no-referrer">
    <meta name="description" content="Chess puzzles in a reels-style feed. Solve fast, skip when you want, and keep your streak alive before the clock runs out.">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <meta name="application-name" content="Chesstok">
    <meta name="apple-mobile-web-app-title" content="Chesstok">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta property="og:site_name" content="Chesstok">
    <meta property="og:title" content="Chesstok | Chess puzzles you can scroll">
    <meta property="og:description" content="Chess puzzles in a reels-style feed. Solve fast, skip when you want, and keep your streak alive before the clock runs out.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://angelicanaguio.com/chesstok/">
    <meta property="og:image" content="https://angelicanaguio.com/chesstok/social-card-v4.png">
    <meta property="og:image:secure_url" content="https://angelicanaguio.com/chesstok/social-card-v4.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Chesstok chess puzzle feed preview">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Chesstok | Chess puzzles you can scroll">
    <meta name="twitter:description" content="Chess puzzles in a reels-style feed. Solve fast, skip when you want, and keep your streak alive before the clock runs out.">
    <meta name="twitter:image" content="https://angelicanaguio.com/chesstok/social-card-v4.png">
    <meta name="twitter:image:alt" content="Chesstok chess puzzle feed preview">
    <title>Chesstok | Chess puzzles you can scroll</title>
    <link rel="canonical" href="https://angelicanaguio.com/chesstok/">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <link rel="preload" href="./pieces.svg?v=25" as="image" type="image/svg+xml">
    <link rel="modulepreload" href="./vendor/chess.mjs">
    <link rel="modulepreload" href="./puzzles.js?v=25">
    <link rel="stylesheet" href="./styles.css?v=25">
  </head>
  <body>
    <main class="app-shell">
      <div class="flow-meter" aria-label="Streak clock">
        <span id="flowFill"></span>
      </div>
      <div id="clockValue" class="clock-value" aria-live="off">60s</div>
      <header class="hud" aria-label="Session">
        <div>
          <p class="kicker">Chesstok</p>
          <h1 id="puzzleTitle">To move</h1>
          <p id="ratingValue" class="rating-chip">1200 · medium</p>
        </div>
        <div class="stats" aria-label="Stats">
          <span id="xpStat" class="xp-stat" aria-label="Level 1, 0 of 120 XP">
            <b id="levelValue">Lv 1</b>
            <i aria-hidden="true"><em id="xpFill"></em></i>
            <strong id="xpValue">0/120 XP</strong>
          </span>
          <span><b id="streakValue">0</b> streak</span>
          <span><b id="solvedValue">0</b> solved</span>
        </div>
      </header>

      <section id="feed" class="feed" aria-label="Puzzle feed"></section>

      <aside class="rail" aria-label="Actions">
        <button id="skipButton" class="icon-button" type="button" aria-label="Skip puzzle" title="Skip">
          <span aria-hidden="true">↓</span>
        </button>
        <span class="rail-label">Skip</span>

        <button id="revealButton" class="icon-button" type="button" aria-label="Show answer" title="Show answer">
          <span aria-hidden="true">?</span>
        </button>
        <span class="rail-label">Answer</span>

        <button id="saveButton" class="icon-button" type="button" aria-label="Save puzzle" title="Save">
          <span aria-hidden="true">☆</span>
        </button>
        <span class="rail-label">Save</span>

        <button id="resetButton" class="icon-button" type="button" aria-label="Retry puzzle" title="Retry">
          <span aria-hidden="true">↻</span>
        </button>
        <span class="rail-label">Retry</span>
      </aside>

      <footer id="dock" class="dock" aria-live="polite">
        <ol id="lineList" class="line-list" aria-label="Solution line"></ol>
      </footer>

      <div id="comboToast" class="combo-toast" aria-live="polite"></div>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>

    <script type="module" src="./app.js?v=25"></script>
  </body>
</html>
