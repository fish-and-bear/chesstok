<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Chesstok</title>
  <desc id="desc">Chess puzzles in a reels-style feed</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0b100d"/>
      <stop offset="0.54" stop-color="#111a14"/>
      <stop offset="1" stop-color="#070a08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <style>
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
      .piece { font-family: Arial Unicode MS, Segoe UI Symbol, Noto Sans Symbols2, sans-serif; font-size: 46px; font-weight: 700; text-anchor: middle; dominant-baseline: central; }
      .white { fill: #f5f1e8; stroke: #090d0a; stroke-width: 2px; paint-order: stroke; }
      .black { fill: #050806; stroke: rgba(245,241,232,0.55); stroke-width: 1.2px; paint-order: stroke; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect y="0" width="1200" height="6" fill="#91cf74"/>
  <rect x="548" y="18" width="104" height="28" rx="14" fill="rgba(16,21,18,0.78)" stroke="rgba(245,241,232,0.18)"/>
  <text x="600" y="38" class="sans" text-anchor="middle" fill="#f5f1e8" font-size="14" font-weight="900">60s</text>

  <g transform="translate(76 72)">
    <text class="sans" x="0" y="0" fill="#b7d6bf" font-size="27" font-weight="850" letter-spacing="0">Chesstok</text>
    <text class="sans" x="0" y="110" fill="#f5f1e8" font-size="72" font-weight="900" letter-spacing="0">
      <tspan x="0">Chess puzzles</tspan>
      <tspan x="0" dy="78">that scroll</tspan>
    </text>
    <text class="sans" x="0" y="330" fill="#c9d6c7" font-size="29" font-weight="760" letter-spacing="0">
      <tspan x="0">10,000 tactics in a reels-style feed.</tspan>
      <tspan x="0" dy="43">Solve before the streak clock runs out.</tspan>
    </text>
    <text class="sans" x="0" y="506" fill="#adbaad" font-size="22" font-weight="800" letter-spacing="0">angelicanaguio.com/chesstok</text>
  </g>

  <g transform="translate(674 62)" filter="url(#shadow)">
    <rect x="-22" y="-20" width="494" height="536" rx="28" fill="#070a08"/>
    <rect x="-22" y="-20" width="494" height="170" rx="28" fill="rgba(7,10,8,0.96)"/>
    <text class="sans" x="0" y="0" fill="#f5f1e8" font-size="27" font-weight="900">White to move</text>
    <rect x="0" y="16" width="98" height="26" rx="7" fill="rgba(16,21,18,0.74)" stroke="rgba(245,241,232,0.14)"/>
    <text class="sans" x="49" y="34" text-anchor="middle" fill="#c9d6c7" font-size="13" font-weight="800">1240 · medium</text>

    <g transform="translate(320 -2)">
      <rect width="72" height="42" rx="8" fill="rgba(16,21,18,0.78)" stroke="rgba(245,241,232,0.14)"/>
      <text class="sans" x="36" y="27" text-anchor="middle" fill="#f5f1e8" font-size="15" font-weight="900">3</text>
      <text class="sans" x="46" y="27" fill="#adbaad" font-size="11" font-weight="760">streak</text>
    </g>
    <g transform="translate(400 -2)">
      <rect width="72" height="42" rx="8" fill="rgba(16,21,18,0.78)" stroke="rgba(245,241,232,0.14)"/>
      <text class="sans" x="32" y="27" text-anchor="middle" fill="#f5f1e8" font-size="15" font-weight="900">18</text>
      <text class="sans" x="46" y="27" fill="#adbaad" font-size="11" font-weight="760">solved</text>
    </g>

