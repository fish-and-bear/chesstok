        <rect x="336" y="56" width="56" height="56" fill="#6d8d65"/>
        <rect x="56" y="112" width="56" height="56" fill="#6d8d65"/>
        <rect x="168" y="112" width="56" height="56" fill="#6d8d65"/>
        <rect x="280" y="112" width="56" height="56" fill="#6d8d65"/>
        <rect x="392" y="112" width="56" height="56" fill="#6d8d65"/>
        <rect x="0" y="168" width="56" height="56" fill="#6d8d65"/>
        <rect x="112" y="168" width="56" height="56" fill="#6d8d65"/>
        <rect x="224" y="168" width="56" height="56" fill="#6d8d65"/>
        <rect x="336" y="168" width="56" height="56" fill="#6d8d65"/>
        <rect x="56" y="224" width="56" height="56" fill="#6d8d65"/>
        <rect x="168" y="224" width="56" height="56" fill="#6d8d65"/>
        <rect x="280" y="224" width="56" height="56" fill="#6d8d65"/>
        <rect x="392" y="224" width="56" height="56" fill="#6d8d65"/>
        <rect x="0" y="280" width="56" height="56" fill="#6d8d65"/>
        <rect x="112" y="280" width="56" height="56" fill="#6d8d65"/>
        <rect x="224" y="280" width="56" height="56" fill="#6d8d65"/>
        <rect x="336" y="280" width="56" height="56" fill="#6d8d65"/>
        <rect x="56" y="336" width="56" height="56" fill="#6d8d65"/>
        <rect x="168" y="336" width="56" height="56" fill="#6d8d65"/>
        <rect x="280" y="336" width="56" height="56" fill="#6d8d65"/>
        <rect x="392" y="336" width="56" height="56" fill="#6d8d65"/>
        <rect x="0" y="392" width="56" height="56" fill="#6d8d65"/>
        <rect x="112" y="392" width="56" height="56" fill="#6d8d65"/>
        <rect x="224" y="392" width="56" height="56" fill="#6d8d65"/>
        <rect x="336" y="392" width="56" height="56" fill="#6d8d65"/>
