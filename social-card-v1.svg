      <rect width="448" height="448" rx="5" fill="#eadfbe"/>
      <g>
        <rect x="56" y="0" width="56" height="56" fill="#6d8d65"/>
        <rect x="168" y="0" width="56" height="56" fill="#6d8d65"/>
        <rect x="280" y="0" width="56" height="56" fill="#6d8d65"/>
