      <circle cx="308" cy="196" r="23" fill="none" stroke="rgba(245,241,232,0.82)" stroke-width="7"/>

      <text class="piece black" x="308" y="84">♚</text>
      <text class="piece black" x="364" y="84">♞</text>
      <text class="piece black" x="84" y="140">♟</text>
      <text class="piece white" x="252" y="196">♘</text>
      <text class="piece white" x="308" y="196">♕</text>
      <text class="piece white" x="84" y="252">♗</text>
      <text class="piece black" x="196" y="252">♟</text>
      <text class="piece white" x="308" y="308">♙</text>
      <text class="piece black" x="84" y="420">♜</text>
